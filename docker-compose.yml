services:
  kultura:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kultura-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - kultura-network

  nginx:
    image: nginx:alpine
    container_name: kultura-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certbot-conf:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot:ro
    # envsubst replaces ${DOMAIN} in template → /etc/nginx/nginx.conf
    command: >
      sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      kultura:
        condition: service_healthy
    networks:
      - kultura-network
    profiles:
      - production

  certbot:
    image: certbot/certbot:latest
    container_name: kultura-certbot
    restart: unless-stopped
    volumes:
      - ./certbot-conf:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    profiles:
      - production
    depends_on:
      - nginx

networks:
  kultura-network:
    driver: bridge
